# Fast CI: runs on every PR and every push that isn't to main. No signing,
# no notarization — just go build + go test + vet.
#
# The signed/notarized release artifact is built by .github/workflows/release.yml
# on main-branch pushes.

name: ci

on:
  pull_request:
  push:
    branches-ignore: [main]

jobs:
  test:
    runs-on: macos-15
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/Library/Caches/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: ${{ runner.os }}-go-

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...
